kind = "web"
previewPath = "/"
title = "Security Intelligence Dashboard"
version = "1.0.0"
id = "artifacts/security-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18344
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/security-dashboard run dev"

[services.env]
PORT = "18344"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/security-dashboard", "run", "build"]
publicDir = "artifacts/security-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
